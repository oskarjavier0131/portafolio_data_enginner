{% extends "base.html" %}
{% load static %}

{% block title %}Consultor IA — Oscar Javier{% endblock %}

{% block extra_css %}
<style>
/* ── Consultor IA page ── */
.cia-section {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    position: relative;
}

/* ── Pill choice screen ── */
.cia-choice {
    text-align: center;
    max-width: 560px;
    width: 100%;
    animation: fadeInUp 0.7s ease both;
}

.cia-choice__eyebrow {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 20px;
}

.cia-choice__title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--text-primary);
    margin-bottom: 16px;
}

.cia-choice__title span {
    background: linear-gradient(135deg, #ff4444 0%, #ff8800 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.cia-choice__desc {
    font-size: 1rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 48px;
}

.cia-pills {
    display: flex;
    gap: 24px; /* Un poco más de espacio entre ellas */
    justify-content: center;
    align-items: center;
    flex-wrap: nowrap; /* Forzamos que estén una al lado de la otra en desktop */
}

@media (max-width: 600px) {
    .cia-pills {
        flex-wrap: wrap; /* En móviles muy pequeños que bajen */
        gap: 16px;
    }
}

.cia-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-width: 200px; /* Un poco más estrechas */
    padding: 14px 30px;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    background: #000; /* Fondo negro puro para que el neón resalte */
    position: relative;
    overflow: hidden;
}

.cia-pill--red {
    color: #ff3333;
    border-color: #ff3333;
    box-shadow: 0 0 10px rgba(255, 51, 51, 0.3), inset 0 0 5px rgba(255, 51, 51, 0.2);
    animation: neon-pulse-red 2s infinite;
}

.cia-pill--red:hover {
    color: #ff6666;
    border-color: #ff6666;
    box-shadow: 0 0 25px rgba(255, 51, 51, 0.6), inset 0 0 10px rgba(255, 51, 51, 0.4);
    transform: translateY(-2px) scale(1.05);
}

.cia-pill--blue {
    color: #3388ff;
    border-color: #3388ff;
    box-shadow: 0 0 10px rgba(51, 136, 255, 0.3), inset 0 0 5px rgba(51, 136, 255, 0.2);
    animation: neon-pulse-blue 2s infinite;
}

.cia-pill--blue:hover {
    color: #66aaff;
    border-color: #66aaff;
    box-shadow: 0 0 25px rgba(51, 136, 255, 0.6), inset 0 0 10px rgba(51, 136, 255, 0.4);
    transform: translateY(-2px) scale(1.05);
}

@keyframes neon-pulse-red {
    0% { box-shadow: 0 0 10px rgba(255, 51, 51, 0.3); }
    50% { box-shadow: 0 0 20px rgba(255, 51, 51, 0.5); }
    100% { box-shadow: 0 0 10px rgba(255, 51, 51, 0.3); }
}

@keyframes neon-pulse-blue {
    0% { box-shadow: 0 0 10px rgba(51, 136, 255, 0.3); }
    50% { box-shadow: 0 0 20px rgba(51, 136, 255, 0.5); }
    100% { box-shadow: 0 0 10px rgba(51, 136, 255, 0.3); }
}

.cia-pill__dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.cia-pill--red .cia-pill__dot {
    background: #ff3333;
    box-shadow: 0 0 10px #ff3333;
}

.cia-pill--blue .cia-pill__dot {
    background: #3388ff;
    box-shadow: 0 0 10px #3388ff;
}

/* ── Terminal ── */
.cia-terminal-wrap {
    width: 100%;
    max-width: 900px; /* Más grande */
    animation: fadeInUp 0.6s ease both;
    margin: 0 auto;
}

.cia-terminal {
    background: #000000; /* Negro puro */
    border: 1px solid #00ff88; /* Borde neón verde */
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
    font-family: 'Courier New', 'Lucida Console', monospace;
    display: flex;
    flex-direction: column;
    height: 70vh; /* Mucho más alto */
    min-height: 500px;
}

.cia-terminal__header {
    background: #0a0a0a;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #1a1a1a;
}

.cia-terminal__body {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    scroll-behavior: smooth;
    background: linear-gradient(rgba(0, 255, 136, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
    background-size: 20px 20px;
}

.cia-terminal__body::-webkit-scrollbar { width: 6px; }
.cia-terminal__body::-webkit-scrollbar-track { background: transparent; }
.cia-terminal__body::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 3px; }

/* Mensajes estilo Chat IA + Terminal */
.cia-msg {
    margin-bottom: 24px;
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    position: relative;
    line-height: 1.6;
}

.cia-msg--agent {
    align-self: flex-start;
    background: rgba(0, 255, 136, 0.05);
    border-left: 3px solid #00ff88;
    color: #00ff88;
}

.cia-msg--user {
    align-self: flex-end;
    background: rgba(255, 255, 255, 0.05);
    border-right: 3px solid #8b949e;
    color: #e6edf3;
    margin-left: auto;
}

.cia-msg__prompt {
    font-weight: bold;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    display: block;
}

.cia-msg__time {
    display: none; /* Simplificamos para look de chat */
}

.cia-msg__text {
    font-size: 0.95rem;
    white-space: pre-wrap;
}

.cia-cursor {
    display: inline-block;
    width: 10px;
    height: 18px;
    background: #00ff88;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
    box-shadow: 0 0 10px #00ff88;
}

/* ── Input row estilo Chat Moderno ── */
.cia-terminal__input-row {
    display: flex;
    align-items: center;
    padding: 20px;
    background: #050505;
    border-top: 1px solid #1a1a1a;
    gap: 15px;
}

.cia-terminal__input {
    flex: 1;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid #1a1a1a;
    padding: 12px 20px;
    border-radius: 25px;
    color: #e6edf3;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: all 0.3s ease;
}

.cia-terminal__input:focus {
    border-color: #00ff88;
    box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
}

.cia-terminal__send {
    background: #00ff88;
    color: #000;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-weight: bold;
}

.cia-terminal__send:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #00ff88;
}

.cia-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 0.82rem;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.3s ease;
}

.cia-back-btn:hover {
    border-color: var(--border-hover);
    color: var(--text-primary);
}

/* ── Loader dots ── */
.cia-loader {
    display: inline-flex;
    gap: 4px;
    align-items: center;
}
.cia-loader span {
    width: 5px;
    height: 5px;
    background: #00ff88;
    border-radius: 50%;
    animation: loaderDot 1.2s ease-in-out infinite;
}
.cia-loader span:nth-child(2) { animation-delay: 0.2s; }
.cia-loader span:nth-child(3) { animation-delay: 0.4s; }

/* ── Keyframes ── */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}

@keyframes loaderDot {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
}
</style>
{% endblock %}

{% block content %}
<section class="cia-section" id="consultor-ia">
    <div style="width:100%; display:flex; flex-direction:column; align-items:center;">

        <!-- ── Terminal ── -->
        <div class="cia-terminal-wrap" id="cia-terminal-wrap">
            <div class="cia-terminal">
                <div class="cia-terminal__header">
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #ff5f57;"></div>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #ffbd2e;"></div>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #28c840;"></div>
                    <span style="margin-left: 10px; font-size: 0.75rem; color: #666;">asistente-ia.sh — 900x600</span>
                </div>
                <div class="cia-terminal__body" id="cia-output">
                    <!-- El mensaje inicial se cargará vía JS -->
                </div>
                <div class="cia-terminal__input-row">
                    <input
                        type="text"
                        class="cia-terminal__input"
                        id="cia-input"
                        placeholder="Sigue al conejo blanco... 🐇 (Presiona Enter)"
                        autocomplete="off"
                    >
                    <button class="cia-terminal__send" id="cia-send" onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>

    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
const WEBHOOK_URL = 'https://n8n-production-1efa.up.railway.app/webhook/whatsapp-agent';
const OUTPUT = document.getElementById('cia-output');
const INPUT  = document.getElementById('cia-input');
const SEND   = document.getElementById('cia-send');

/* ── Helpers ── */
function now() {
    return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}

function scrollBottom() {
    OUTPUT.scrollTop = OUTPUT.scrollHeight;
}

let isConversationStarted = false;

async function initRabbit() {
    OUTPUT.innerHTML = '';
    const span = document.createElement('span');
    span.className = 'cia-msg__text';
    const div = document.createElement('div');
    div.className = 'cia-msg cia-msg--agent';
    div.innerHTML = '<span class="cia-msg__prompt">SISTEMA</span>';
    div.appendChild(span);
    OUTPUT.appendChild(div);
    
    await typewrite(span, 'Sigue al conejo blanco... 🐇', 60);
    await delay(500);
    
    const hint = document.createElement('div');
    hint.className = 'cia-msg cia-msg--system';
    hint.style.opacity = '0.5';
    hint.innerHTML = '<span class="cia-msg__text">[ Presiona ENTER para iniciar la conexión ]</span>';
    OUTPUT.appendChild(hint);
    scrollBottom();
}

async function startConversation() {
    if (isConversationStarted) return;
    isConversationStarted = true;
    
    INPUT.placeholder = "Escribiendo...";
    INPUT.disabled = true;

    await appendMsg('system', 'Estableciendo enlace neuronal...', true);
    await delay(800);
    await appendMsg('agent', 'Bienvenido al Consultor IA. Soy el agente encargado de potenciar tu negocio. ¿En qué puedo ayudarte hoy?');
    
    INPUT.placeholder = "Escribe tu mensaje aquí...";
    INPUT.disabled = false;
    INPUT.focus();
}

function appendMsg(role, text, skipTypewriter = false) {
    const div = document.createElement('div');
    div.className = 'cia-msg cia-msg--' + role;

    const prompt = document.createElement('span');
    prompt.className = 'cia-msg__prompt';
    prompt.textContent = role === 'user' ? 'oscar@consultor:~$' : 'SISTEMA>';

    const textSpan = document.createElement('span');
    textSpan.className = 'cia-msg__text';

    div.appendChild(prompt);
    div.appendChild(textSpan);
    OUTPUT.appendChild(div);
    scrollBottom();

    if (skipTypewriter) {
        textSpan.textContent = text;
        scrollBottom();
        return Promise.resolve();
    }
    return typewrite(textSpan, text);
}

function typewrite(el, text, speed = 28) {
    return new Promise(resolve => {
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'cia-cursor';
        el.appendChild(cursor);

        function tick() {
            if (i < text.length) {
                cursor.before(document.createTextNode(text[i++]));
                scrollBottom();
                setTimeout(tick, speed + Math.random() * 18);
            } else {
                cursor.remove();
                resolve();
            }
        }
        tick();
    });
}

function appendLoader() {
    const div = document.createElement('div');
    div.className = 'cia-msg cia-msg--agent';
    div.id = 'cia-loader-row';
    div.innerHTML = `<span class="cia-msg__prompt">SISTEMA&gt;</span> <span class="cia-msg__text">Procesando... <span class="cia-cursor"></span></span>`;
    OUTPUT.appendChild(div);
    scrollBottom();
}

function removeLoader() {
    const el = document.getElementById('cia-loader-row');
    if (el) el.remove();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── Send message ── */
async function sendMessage() {
    if (!isConversationStarted) {
        startConversation();
        return;
    }

    const text = INPUT.value.trim();
    if (!text) return;

    INPUT.value = '';
    INPUT.disabled = true;

    await appendMsg('user', text, true);
    appendLoader();

    try {
        const res = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, phone: 'web-visitor', name: 'Visitante Web' })
        });

        removeLoader();
        if (!res.ok) throw new Error('HTTP ' + res.status);

        let reply = '';
        const data = await res.json();
        reply = data.response || data.output || data.message || data.text || data.reply || JSON.stringify(data);

        await appendMsg('agent', reply);
    } catch (err) {
        removeLoader();
        await appendMsg('system', 'Error de conexión. Intenta de nuevo.', true);
    } finally {
        INPUT.disabled = false;
        INPUT.focus();
    }
}

// Iniciar al cargar
window.addEventListener('DOMContentLoaded', initRabbit);

/* ── Enter key ── */
INPUT.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        if (!isConversationStarted) {
            startConversation();
        } else if (!INPUT.disabled) {
            sendMessage();
        }
    }
});
</script>
{% endblock %}
