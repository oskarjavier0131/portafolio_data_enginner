{% extends "base.html" %}
{% load static %}

{% block title %}Consultor IA — Oscar Javier{% endblock %}

{% block extra_css %}
<style>
/* ── Consultor IA page ── */
.cia-section {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    position: relative;
    overflow: hidden;
}

/* ── Mobile responsive ── */
@media (max-width: 768px) {
    .cia-section {
        padding: 0;
        min-height: calc(100dvh - 56px);
        align-items: stretch;
    }

    .cia-section > div {
        flex: 1;
        justify-content: stretch;
    }

    .cia-terminal-wrap {
        flex: 1;
        max-width: 100%;
        display: flex;
        flex-direction: column;
        animation: none;
    }

    .cia-terminal {
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        height: calc(100dvh - 56px);
        min-height: unset;
        flex: 1;
    }

    .cia-terminal__header {
        padding: 12px 16px;
    }

    .cia-terminal__body {
        padding: 14px 12px;
        gap: 10px;
    }

    .cia-msg {
        max-width: 88%;
        padding: 9px 13px;
    }

    .cia-msg__text {
        font-size: 0.95rem;
    }

    .cia-terminal__input-row {
        padding: 10px 12px;
        /* Stays above mobile bottom nav */
        padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    .cia-terminal__input {
        font-size: 1rem; /* evita zoom en iOS */
        padding: 10px 16px;
    }

    .cia-terminal__send {
        width: 46px;
        height: 46px;
        min-width: 46px;
    }

    .cia-header__name {
        font-size: 0.88rem;
    }
}

/* ── Matrix canvas background ── */
#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.18;
    pointer-events: none;
}

/* ── Chat wrapper ── */
.cia-terminal-wrap {
    width: 100%;
    max-width: 760px;
    animation: fadeInUp 0.6s ease both;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

/* ── Chat container ── */
.cia-terminal {
    background: rgba(2, 8, 2, 0.92);
    border: 1px solid rgba(0, 255, 65, 0.25);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 255, 65, 0.08), 0 20px 60px rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    height: 72vh;
    min-height: 520px;
}

/* ── Chat header ── */
.cia-terminal__header {
    background: rgba(0, 10, 0, 0.8);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(0, 255, 65, 0.12);
}

.cia-header__avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #001a00, #003300);
    border: 1.5px solid rgba(0, 255, 65, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(0, 255, 65, 0.15);
}

.cia-header__info {
    flex: 1;
}

.cia-header__name {
    font-size: 0.9rem;
    font-weight: 600;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.03em;
}

.cia-header__status {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
}

.cia-header__dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #00ff41;
    box-shadow: 0 0 6px #00ff41;
    animation: pulse-dot 2s infinite;
}

.cia-header__status-text {
    font-size: 0.72rem;
    color: rgba(0, 255, 65, 0.55);
    font-family: 'Courier New', monospace;
}

@keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px #00ff41; }
    50% { opacity: 0.5; box-shadow: 0 0 2px #00ff41; }
}

/* ── Chat messages area ── */
.cia-terminal__body {
    flex: 1;
    padding: 20px 16px;
    overflow-y: auto;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.cia-terminal__body::-webkit-scrollbar { width: 4px; }
.cia-terminal__body::-webkit-scrollbar-track { background: transparent; }
.cia-terminal__body::-webkit-scrollbar-thumb { background: rgba(0, 255, 65, 0.2); border-radius: 2px; }

/* ── Bubble messages ── */
.cia-msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    line-height: 1.55;
    position: relative;
    word-break: break-word;
}

.cia-msg--agent {
    align-self: flex-start;
    background: rgba(0, 255, 65, 0.07);
    border: 1px solid rgba(0, 255, 65, 0.18);
    border-bottom-left-radius: 4px;
    color: #b8ffca;
}

.cia-msg--user {
    align-self: flex-end;
    background: rgba(0, 80, 20, 0.5);
    border: 1px solid rgba(0, 255, 65, 0.25);
    border-bottom-right-radius: 4px;
    color: #e8ffe8;
}

.cia-msg--system {
    align-self: center;
    background: transparent;
    border: none;
    color: rgba(0, 255, 65, 0.35);
    font-size: 0.72rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
    padding: 2px 8px;
}

.cia-msg__prompt {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
    font-family: 'Courier New', monospace;
    opacity: 0.6;
    color: #00ff41;
}

.cia-msg--user .cia-msg__prompt {
    color: rgba(0, 255, 65, 0.5);
    text-align: right;
}

.cia-msg__text {
    font-size: 0.92rem;
    font-family: 'Inter', sans-serif;
    white-space: pre-wrap;
}

.cia-cursor {
    display: inline-block;
    width: 2px;
    height: 15px;
    background: #00ff41;
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
    box-shadow: 0 0 6px #00ff41;
    border-radius: 1px;
}

/* ── Input row ── */
.cia-terminal__input-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    background: rgba(0, 5, 0, 0.7);
    border-top: 1px solid rgba(0, 255, 65, 0.1);
    gap: 10px;
}

.cia-terminal__input {
    flex: 1;
    background: rgba(0, 255, 65, 0.04);
    border: 1px solid rgba(0, 255, 65, 0.15);
    padding: 11px 18px;
    border-radius: 24px;
    color: #d4ffd4;
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: all 0.3s ease;
}

.cia-terminal__input::placeholder {
    color: rgba(0, 255, 65, 0.25);
}

.cia-terminal__input:focus {
    border-color: rgba(0, 255, 65, 0.4);
    box-shadow: 0 0 12px rgba(0, 255, 65, 0.06);
    background: rgba(0, 255, 65, 0.06);
}

.cia-terminal__send {
    background: rgba(0, 255, 65, 0.12);
    color: #00ff41;
    border: 1px solid rgba(0, 255, 65, 0.3);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    flex-shrink: 0;
}

.cia-terminal__send:hover {
    background: rgba(0, 255, 65, 0.22);
    box-shadow: 0 0 16px rgba(0, 255, 65, 0.25);
    transform: scale(1.05);
}

/* ── Loader typing indicator ── */
.cia-typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 10px 14px;
}

.cia-typing span {
    width: 6px;
    height: 6px;
    background: #00ff41;
    border-radius: 50%;
    opacity: 0.4;
    animation: typingBounce 1.2s ease-in-out infinite;
}
.cia-typing span:nth-child(2) { animation-delay: 0.2s; }
.cia-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; box-shadow: 0 0 6px #00ff41; }
}

/* ── Keyframes ── */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}
</style>
{% endblock %}

{% block content %}
<!-- Matrix rain canvas -->
<canvas id="matrix-canvas"></canvas>

<section class="cia-section" id="consultor-ia">
    <div style="width:100%; display:flex; flex-direction:column; align-items:center;">

        <!-- ── Chat ── -->
        <div class="cia-terminal-wrap" id="cia-terminal-wrap">
            <div class="cia-terminal">
                <!-- Header -->
                <div class="cia-terminal__header">
                    <div class="cia-header__avatar">&#x1F916;</div>
                    <div class="cia-header__info">
                        <div class="cia-header__name">Agente IA</div>
                        <div class="cia-header__status">
                            <div class="cia-header__dot"></div>
                            <span class="cia-header__status-text">en línea</span>
                        </div>
                    </div>
                </div>
                <!-- Messages -->
                <div class="cia-terminal__body" id="cia-output"></div>
                <!-- Input -->
                <div class="cia-terminal__input-row">
                    <input
                        type="text"
                        class="cia-terminal__input"
                        id="cia-input"
                        placeholder="Sigue al conejo blanco..."
                        autocomplete="off"
                        autocorrect="off"
                        spellcheck="false"
                        enterkeyhint="send"
                    >
                    <button class="cia-terminal__send" id="cia-send" onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>

    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
/* ══════════════════════════════════════
   Matrix rain background
══════════════════════════════════════ */
(function() {
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン01';
    let cols, drops;

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        cols  = Math.floor(canvas.width / 16);
        drops = Array(cols).fill(1);
    }

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff41';
        ctx.font = '14px Courier New';
        for (let i = 0; i < drops.length; i++) {
            const ch = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(ch, i * 16, drops[i] * 16);
            if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    resize();
    window.addEventListener('resize', resize);
    setInterval(draw, 50);
})();

/* ══════════════════════════════════════
   Chat IA
══════════════════════════════════════ */
const WEBHOOK_URL = 'https://n8n-production-1efa.up.railway.app/webhook/whatsapp-agent';
const OUTPUT = document.getElementById('cia-output');
const INPUT  = document.getElementById('cia-input');
const SEND   = document.getElementById('cia-send');

function scrollBottom() { OUTPUT.scrollTop = OUTPUT.scrollHeight; }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

let isConversationStarted = false;

async function initRabbit() {
    OUTPUT.innerHTML = '';
    const span = document.createElement('span');
    span.className = 'cia-msg__text';
    const div = document.createElement('div');
    div.className = 'cia-msg cia-msg--agent';
    div.innerHTML = '<span class="cia-msg__prompt">Agente IA</span>';
    div.appendChild(span);
    OUTPUT.appendChild(div);
    await typewrite(span, 'Sigue al conejo blanco... 🐇', 60);
    await delay(400);
    appendSystemMsg('[ Presiona ENTER para iniciar la conexión ]');
    scrollBottom();
}

function appendSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'cia-msg cia-msg--system';
    div.textContent = text;
    OUTPUT.appendChild(div);
    scrollBottom();
}

async function startConversation() {
    if (isConversationStarted) return;
    isConversationStarted = true;
    INPUT.placeholder = 'Conectando...';
    INPUT.disabled = true;
    appendSystemMsg('— enlace establecido —');
    await delay(600);
    await appendMsg('agent', 'Bienvenido al Consultor IA. Soy el agente encargado de potenciar tu negocio. ¿En qué puedo ayudarte hoy?');
    INPUT.placeholder = 'Escribe tu mensaje...';
    INPUT.disabled = false;
    INPUT.focus();
}

function appendMsg(role, text, skipTypewriter = false) {
    const div = document.createElement('div');
    div.className = 'cia-msg cia-msg--' + role;

    const prompt = document.createElement('span');
    prompt.className = 'cia-msg__prompt';
    prompt.textContent = role === 'user' ? 'Tú' : 'Agente IA';

    const textSpan = document.createElement('span');
    textSpan.className = 'cia-msg__text';

    div.appendChild(prompt);
    div.appendChild(textSpan);
    OUTPUT.appendChild(div);
    scrollBottom();

    if (skipTypewriter) {
        textSpan.textContent = text;
        scrollBottom();
        return Promise.resolve();
    }
    return typewrite(textSpan, text);
}

function typewrite(el, text, speed = 22) {
    return new Promise(resolve => {
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'cia-cursor';
        el.appendChild(cursor);
        function tick() {
            if (i < text.length) {
                cursor.before(document.createTextNode(text[i++]));
                scrollBottom();
                setTimeout(tick, speed + Math.random() * 14);
            } else {
                cursor.remove();
                resolve();
            }
        }
        tick();
    });
}

function appendLoader() {
    const div = document.createElement('div');
    div.className = 'cia-msg cia-msg--agent';
    div.id = 'cia-loader-row';
    div.innerHTML = `<span class="cia-msg__prompt">Agente IA</span><div class="cia-typing"><span></span><span></span><span></span></div>`;
    OUTPUT.appendChild(div);
    scrollBottom();
}

function removeLoader() {
    const el = document.getElementById('cia-loader-row');
    if (el) el.remove();
}

async function sendMessage() {
    if (!isConversationStarted) { startConversation(); return; }
    const text = INPUT.value.trim();
    if (!text) return;
    INPUT.value = '';
    INPUT.disabled = true;
    await appendMsg('user', text, true);
    appendLoader();
    try {
        const res = await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, phone: 'web-visitor', name: 'Visitante Web' })
        });
        removeLoader();
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const reply = data.response || data.output || data.message || data.text || data.reply || JSON.stringify(data);
        await appendMsg('agent', reply);
    } catch (err) {
        removeLoader();
        appendSystemMsg('— error de conexión, intenta de nuevo —');
    } finally {
        INPUT.disabled = false;
        INPUT.focus();
    }
}

window.addEventListener('DOMContentLoaded', initRabbit);

INPUT.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        if (!isConversationStarted) startConversation();
        else if (!INPUT.disabled) sendMessage();
    }
});

/* ── Keyboard visual viewport fix (iOS Safari) ── */
if ('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', () => {
        const terminal = document.querySelector('.cia-terminal');
        if (terminal && window.innerWidth <= 768) {
            const offset = window.innerHeight - window.visualViewport.height;
            terminal.style.height = (window.visualViewport.height - 56) + 'px';
            scrollBottom();
        }
    });
}
</script>
{% endblock %}
