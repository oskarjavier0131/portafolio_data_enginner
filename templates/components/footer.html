<footer class="footer">
    <div class="container">
        <div class="footer__inner">
            <p class="footer__copy">© 2026 Oscar Javier. Todos los derechos reservados.</p>
            <nav class="footer__links" aria-label="Links sociales">
                {% if site_config.github_url %}
                <a href="{{ site_config.github_url }}" class="footer__link" target="_blank" rel="noopener">GitHub</a>
                {% endif %}
                {% if site_config.linkedin_url %}
                <a href="{{ site_config.linkedin_url }}" class="footer__link" target="_blank" rel="noopener">LinkedIn</a>
                {% endif %}
                {% if site_config.email %}
                <a href="mailto:{{ site_config.email }}" class="footer__link">Email</a>
                {% endif %}
            </nav>
        </div>
    </div>
</footer>
